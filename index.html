<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morse Cat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

<body class="container">
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a href="https://kittkat.xyz">kittkat.xyz</a>
        </div>
    </nav>
    <div id="title" class="container text-center p-5">
        <h1>MorseCat</h1>
        <p>A Morse code practice site.</p>
    </div>

    <div id="letterbox" class="alert alert-info">
        <h1 class="text-center">LETTER HERE</h1>
        <h2 class="text-center">CODE HERE</h2>
        <hr>
        <h2 class="text-center">YOUR CODE HERE</h2>
        <div class="row text-center">
            <span class="col"><button class="btn btn-primary">a</button></span>
            <span class="col"><button class="btn btn-primary">b</button></span>
        </div>
    </div>

</html>
